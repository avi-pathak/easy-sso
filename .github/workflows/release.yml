name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the Version Packages PR / tags
  pull-requests: write
  id-token: write # npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & publish (Changesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          # `npm run release` runs `changeset publish` (after build) when there
          # are no pending changesets; otherwise the action opens/updates the
          # "Version Packages" PR.
          version: npm run version
          publish: npm run release
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
